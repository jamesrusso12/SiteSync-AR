# by AppleARKit_IOS_UPL.xml. Do not re-add an AdditionalPlistData= line here.

[/Script/UnrealEd.ProjectPackagingSettings]
# Maps that must be cooked into the iOS package. Without these entries, bare
# `-run=Cook -targetplatform=IOS` only cooks GameDefaultMap (SiteSync_Menu) +
# Entry, so WBP_MainMenu's Open Level calls to Phase 1 / Phase 2 silently
# no-op on device. The cooker doesn't follow runtime string refs — every map
# the user can reach must be declared here. Diagnosed 2026-05-24 after Node
# 2.2a deploy: menu loaded but Phase 1 / Phase 2 buttons did nothing.
+MapsToCook=(FilePath="/Game/Maps/SiteSync_Menu")
+MapsToCook=(FilePath="/Game/Maps/SiteSync_BIMTest")
+MapsToCook=(FilePath="/Game/SiteSync")

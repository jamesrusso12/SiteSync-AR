# Note (2026-05-24): IOSRuntimeSettings.AdditionalPlistData was unreliable in
# UE 5.6 — AppleARKit_IOS_UPL.xml overwrote NSCameraUsageDescription and our
# NSLocation* keys never reached the staged Info.plist (locationd reported
# "missing UsageDescription key" → kCLErrorDomain Code=1). Plist injection
# is now handled by Build/IOS/SiteSyncAR_IOS_UPL.xml, wired in via

name: Deploy marketing site to GitHub Pages

# Deploys ./website to GitHub Pages.
# Repo Settings → Pages → "Build and deployment" → Source must be "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-progress release.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false # don't pull the whole UE LFS store; fetch only the site assets below

      - name: Fetch website LFS assets only
        run: git lfs pull --include="website/assets/*"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # self-enable Pages via the workflow token (personal CLI token lacked perms)

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
